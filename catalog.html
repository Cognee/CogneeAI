<!-- catalog.html — v9.1 | Глобальная версия: 9.1 -->
<!-- Блок 2, Задача 2.3: отображение тегов на карточках статей -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognee — Каталог статей</title>

    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:       #0a0e17;
            --surface:  #10161f;
            --surface2: #0d1320;
            --border:   rgba(79,195,247,0.12);
            --border2:  rgba(79,195,247,0.28);
            --text:     #e0dbd0;
            --muted:    #5a7090;
            --accent:   #4FC3F7;
            --accent2:  #7C4DFF;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Lora', Georgia, serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        body::before {
            content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background: radial-gradient(ellipse 60% 40% at 15% 0%, rgba(79,195,247,.05) 0%,transparent 60%),
                        radial-gradient(ellipse 50% 50% at 85% 100%, rgba(124,77,255,.04) 0%,transparent 60%);
        }

        .nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10,14,23,.93); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px; height: 56px;
            display: flex; align-items: center; gap: 20px;
        }
        .nav-logo { font-family:'Unbounded',sans-serif; font-size:15px; font-weight:700; color:var(--accent); text-decoration:none; letter-spacing:-.02em; }
        .nav-sep  { flex: 1; }
        .nav-link { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); text-decoration:none; letter-spacing:.04em; transition:color .2s; }
        .nav-link:hover  { color: var(--text); }
        .nav-link.active { color: var(--accent); }

        .catalog-wrap { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 48px 24px 100px; }
        .catalog-hero { margin-bottom: 40px; }
        .catalog-title { font-family:'Unbounded',sans-serif; font-size:clamp(22px,4vw,34px); font-weight:700; letter-spacing:-.03em; margin-bottom:8px; }
        .catalog-sub   { font-size:14px; color:var(--muted); font-style:italic; }

        .search-wrap { position:relative; margin-bottom:32px; }
        .search-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); font-size:16px; pointer-events:none; color:var(--muted); }
        .search-input {
            width:100%; background:var(--surface); border:1px solid var(--border);
            border-radius:10px; color:var(--text); font-family:'Lora',Georgia,serif; font-size:15px;
            padding:14px 16px 14px 44px; outline:none; transition:border-color .2s,box-shadow .2s;
        }
        .search-input:focus  { border-color:var(--accent); box-shadow:0 0 0 3px rgba(79,195,247,.1); }
        .search-input::placeholder { color:var(--muted); opacity:.6; }
        .search-clear { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:4px; display:none; transition:color .2s; }
        .search-clear:hover { color:var(--text); }
        .search-clear.vis   { display:block; }

        .catalog-status { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:20px; letter-spacing:.04em; display:flex; align-items:center; justify-content:space-between; }
        .catalog-status span { color:var(--accent); }

        .articles-grid { display:flex; flex-direction:column; gap:14px; }

        .article-card {
            position: relative;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 20px 20px 16px;
            transition: border-color .2s, box-shadow .2s;
            display: block; text-decoration: none; color: inherit;
        }
        .article-card:hover {
            border-color: var(--border2);
            box-shadow: 0 4px 20px rgba(79,195,247,.06);
        }

        .article-card-header {
            display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px;
        }
        .article-card-title {
            font-family: 'Unbounded', sans-serif; font-size: 15px; font-weight: 700;
            letter-spacing: -.02em; line-height: 1.3; flex: 1; min-width: 0;
        }
        .article-card-title mark {
            background: rgba(79,195,247,.2); color: var(--accent); border-radius: 2px; padding: 0 2px;
        }
        .read-time {
            font-family: 'JetBrains Mono', monospace; font-size: 11px;
            color: var(--muted); white-space: nowrap; flex-shrink: 0; padding-top: 2px;
        }
        .card-actions-wrap {
            flex-shrink: 0;
            display: flex; align-items: center;
        }

        .article-card-annotation {
            font-size: 13px; color: var(--muted); line-height: 1.6;
            margin-bottom: 10px; font-style: italic;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        /* Теги на карточке (задача 2.3) */
        .article-card-tags {
            display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px;
        }
        .article-card-tag {
            font-family: 'JetBrains Mono', monospace; font-size: 10px;
            background: rgba(124,77,255,0.08); color: #b39ddb;
            border: 1px solid rgba(124,77,255,0.2); border-radius: 4px;
            padding: 2px 7px; letter-spacing: 0.04em;
        }
        /* Рекомендуемый КИМ на карточке */
        .article-card-kim {
            font-family: 'JetBrains Mono', monospace; font-size: 10px;
            background: rgba(79,195,247,0.08); color: #4FC3F7;
            border: 1px solid rgba(79,195,247,0.2); border-radius: 4px;
            padding: 2px 7px; letter-spacing: 0.04em;
        }

        .article-card-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .article-card-author { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
        .article-card-date   { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }

        .loading-state { text-align:center; padding:60px 20px; color:var(--muted); font-size:14px; }
        .spinner { width:32px; height:32px; border:3px solid rgba(79,195,247,.15); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 14px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .empty-state { text-align:center; padding:80px 20px; background:var(--surface); border:1px dashed var(--border); border-radius:16px; }
        .empty-icon  { font-size:48px; margin-bottom:16px; }
        .empty-title { font-family:'Unbounded',sans-serif; font-size:18px; font-weight:700; margin-bottom:8px; }
        .empty-sub   { font-size:14px; color:var(--muted); margin-bottom:24px; line-height:1.6; }
        .btn-write   { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; background:var(--accent); color:#0a0e17; border:none; border-radius:8px; padding:11px 24px; text-decoration:none; display:inline-block; cursor:pointer; }

        .no-supabase { text-align:center; padding:60px 20px; background:var(--surface); border:1px solid rgba(255,183,77,.2); border-radius:16px; }
        .no-supabase-title { font-family:'Unbounded',sans-serif; font-size:16px; font-weight:700; color:#FFB74D; margin-bottom:8px; }
        .no-supabase-sub   { font-size:13px; color:var(--muted); line-height:1.6; }

        .load-more-wrap { text-align:center; margin-top:28px; }
        .btn-load-more {
            font-family:'JetBrains Mono',monospace; font-size:12px;
            background:transparent; border:1px solid var(--border2); border-radius:8px;
            padding:10px 28px; color:var(--text); cursor:pointer; transition:all .2s;
        }
        .btn-load-more:hover     { border-color:var(--accent); color:var(--accent); }
        .btn-load-more:disabled  { opacity:.4; cursor:not-allowed; }

        @media (max-width:600px) {
            .nav  { padding:0 16px; gap:14px; }
            .catalog-wrap  { padding:32px 16px 80px; }
            .article-card  { padding:16px 14px 14px; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <a class="nav-logo" href="index.html">Cognee</a>
    <div class="nav-sep"></div>
    <a class="nav-link active" href="catalog.html">📚 Каталог</a>
    <a class="nav-link" href="editor.html">+ Написать</a>
    <a class="nav-link" href="profile.html">Профиль</a>
</nav>

<div class="catalog-wrap">
    <div class="catalog-hero">
        <div class="catalog-title">Каталог статей</div>
        <div class="catalog-sub">Публичные статьи авторов Cognee — адаптируются под твоё когнитивное состояние</div>
    </div>

    <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="search-input"
            placeholder="Поиск по заголовку, аннотации или тегам…"
            autocomplete="off" spellcheck="false">
        <button class="search-clear" id="search-clear" onclick="clearSearch()" title="Очистить">×</button>
    </div>

    <div class="catalog-status" id="catalog-status"></div>

    <div id="articles-container">
        <div class="loading-state" id="loading-state">
            <div class="spinner"></div>
            Загружаем статьи…
        </div>
    </div>

    <div class="load-more-wrap" id="load-more-wrap" style="display:none">
        <button class="btn-load-more" id="btn-load-more" onclick="loadMore()">Загрузить ещё</button>
    </div>
</div>

<script src="config.js" onerror="console.warn('[Cognee] config.js не найден')"></script>
<script src="supabase.js"></script>
<script src="article-actions.js"></script>
<script>
// catalog.js inline — v9.1
(function(){
'use strict';

const PAGE_SIZE  = 20;
let _query       = '';
let _offset      = 0;
let _loading     = false;
let _hasMore     = true;
let _searchTimer = null;
let _currentUserId = null;

window.addEventListener('DOMContentLoaded', async () => {
    CogneeActions.initToastContainer();

    if (!window.COGNEE_SUPABASE_URL || !window.COGNEE_SUPABASE_KEY) {
        showNoSupabase();
        return;
    }

    if (window.CogneeSupabase) {
        await CogneeSupabase.init().catch(() => {});
        const me = CogneeSupabase.getCurrentUser?.();
        _currentUserId = me?.id || null;
    }

    const params = new URLSearchParams(location.search);
    const q = params.get('q');
    if (q) {
        document.getElementById('search-input').value = q;
        _query = q.trim();
        toggleClear(q);
    }

    setupSearch();
    await loadArticles(true);
});

function setupSearch() {
    const input = document.getElementById('search-input');
    input.addEventListener('input', () => {
        const val = input.value;
        toggleClear(val);
        clearTimeout(_searchTimer);
        _searchTimer = setTimeout(() => {
            _query = val.trim();
            loadArticles(true);
        }, 350);
    });
}

function toggleClear(val) {
    document.getElementById('search-clear').classList.toggle('vis', val.length > 0);
}

window.clearSearch = function() {
    document.getElementById('search-input').value = '';
    toggleClear('');
    _query = '';
    loadArticles(true);
};

async function loadArticles(reset) {
    if (_loading) return;
    _loading = true;

    if (reset) {
        _offset  = 0;
        _hasMore = true;
        document.getElementById('articles-container').innerHTML =
            '<div class="loading-state"><div class="spinner"></div>Загружаем статьи…</div>';
        document.getElementById('load-more-wrap').style.display = 'none';
    }

    const btn = document.getElementById('btn-load-more');
    if (btn) { btn.disabled = true; btn.textContent = 'Загружаем…'; }

    try {
        const articles = await CogneeSupabase.getPublicArticles(_query, PAGE_SIZE, _offset);
        const isMore   = articles.length === PAGE_SIZE;

        if (reset) {
            if (articles.length === 0) { showEmpty(_query); _loading = false; return; }
            document.getElementById('articles-container').innerHTML = '';
        }

        const grid = document.getElementById('articles-container');
        let container = grid.querySelector('.articles-grid');
        if (!container) {
            container = document.createElement('div');
            container.className = 'articles-grid';
            grid.appendChild(container);
        }

        articles.forEach(a => container.appendChild(buildCard(a)));

        _offset += articles.length;
        _hasMore = isMore;

        document.getElementById('load-more-wrap').style.display = _hasMore ? 'block' : 'none';
        updateStatus();
        if (btn) { btn.disabled = false; btn.textContent = 'Загрузить ещё'; }

    } catch(e) {
        document.getElementById('articles-container').innerHTML =
            `<div class="empty-state"><div class="empty-icon">⚠️</div>
             <div class="empty-title">Ошибка загрузки</div>
             <div class="empty-sub">${_esc(e.message)}</div></div>`;
        console.error('[Catalog v9.1]', e);
    }
    _loading = false;
}

window.loadMore = function() {
    if (_hasMore && !_loading) loadArticles(false);
};

// ── КАРТОЧКА (задача 2.3: добавлены теги) ────────────────────────────────────
function buildCard(article) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative';

    const a = document.createElement('a');
    a.className = 'article-card';
    a.href = 'reader.html?id=' + article.id;

    const date    = article.published_at
        ? new Date(article.published_at).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'})
        : '';
    const readMin = article.read_minutes || 1;
    const titleHtml = _highlight(_esc(article.title || 'Без названия'), _query);
    const isOwner   = !!(_currentUserId && _currentUserId === article.user_id);

    // Строим теги HTML
    let tagsHtml = '';
    const tags = Array.isArray(article.tags) ? article.tags.filter(Boolean) : [];
    if (tags.length > 0) {
        const tagSpans = tags.map(t => `<span class="article-card-tag">${_esc(t)}</span>`).join('');
        const kimBadge = article.recommended_kim
            ? `<span class="article-card-kim">КИМ ≥ ${article.recommended_kim}</span>`
            : '';
        tagsHtml = `<div class="article-card-tags">${tagSpans}${kimBadge}</div>`;
    }

    a.innerHTML = `
        <div class="article-card-header">
            <div class="article-card-title">${titleHtml}</div>
            <div class="read-time">⏱ ${readMin} мин</div>
            <div class="card-actions-wrap" id="ca-wrap-${article.id}"></div>
        </div>
        ${article.annotation
            ? `<div class="article-card-annotation">${_esc(article.annotation)}</div>`
            : ''}
        ${tagsHtml}
        <div class="article-card-footer">
            <div class="article-card-author">👤 ${_esc(article.author_name || 'Автор')}</div>
            <div class="article-card-date">${date}</div>
        </div>`;

    wrap.appendChild(a);

    requestAnimationFrame(() => {
        const target = a.querySelector('#ca-wrap-' + article.id);
        if (!target) return;
        CogneeActions.mountMenu(target, {
            articleId:    article.id,
            articleTitle: article.title,
            articleUrl:   'reader.html?id=' + article.id,
            isOwner:      isOwner,
            onDelete:     () => {
                wrap.style.transition = 'opacity 0.3s';
                wrap.style.opacity    = '0';
                setTimeout(() => wrap.remove(), 300);
            },
        });
    });

    return wrap;
}

function updateStatus() {
    const el = document.getElementById('catalog-status');
    if (!el) return;
    const queryPart = _query ? ` по запросу "<span>${_esc(_query)}</span>"` : '';
    el.innerHTML = `Показано статей: <span>${_offset}</span>${queryPart}`;
}

function showEmpty(query) {
    document.getElementById('articles-container').innerHTML = query
        ? `<div class="empty-state">
            <div class="empty-icon">🔍</div>
            <div class="empty-title">Ничего не найдено</div>
            <div class="empty-sub">По запросу «${_esc(query)}» статей не найдено.<br>Попробуй другой запрос или очисти поиск.</div>
            <button class="btn-write" onclick="clearSearch()">Очистить поиск</button>
           </div>`
        : `<div class="empty-state">
            <div class="empty-icon">✍️</div>
            <div class="empty-title">Пока пусто</div>
            <div class="empty-sub">Публичных статей ещё нет.<br>Стань первым автором!</div>
            <a class="btn-write" href="editor.html">+ Написать статью</a>
           </div>`;
}

function showNoSupabase() {
    document.getElementById('articles-container').innerHTML =
        `<div class="no-supabase">
            <div style="font-size:40px;margin-bottom:14px">⚙️</div>
            <div class="no-supabase-title">Supabase не настроен</div>
            <div class="no-supabase-sub">Добавь ключи в config.js для загрузки статей.</div>
         </div>`;
}

function _highlight(html, q) {
    if (!q) return html;
    const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
    return html.replace(re, '<mark>$1</mark>');
}

function _esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

})();
</script>
</body>
</html>
