<!-- reader.html — v8.3 | Глобальная версия: 8.3 -->
<!-- Блок 3: Страница чтения статьи. Загружает статью по ?id= из Supabase или localStorage. -->
<!-- Подключает CogneeAI адаптацию: КИМ-сенсор, упрощение, ключевые слова. -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognee — Читалка</title>

    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@400;700&display=swap" rel="stylesheet">

    <!-- ONNX Runtime для CogneeAI нейросети -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>

    <link rel="stylesheet" href="styles.css">
    <style>
        /* ── СТИЛИ ЧИТАЛКИ (reader-specific) ── */
        :root {
            --reader-max: 720px;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .reader-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 15, 15, 0.92);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(79, 195, 247, 0.1);
            padding: 0 24px;
            height: 52px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        [data-theme="light"] .reader-nav {
            background: rgba(245, 240, 232, 0.93);
        }

        .reader-nav-logo {
            font-family: 'Unbounded', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #4FC3F7;
            text-decoration: none;
            letter-spacing: -0.02em;
            flex-shrink: 0;
        }

        .reader-nav-title {
            font-size: 13px;
            color: var(--muted, #5a7090);
            font-style: italic;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .reader-nav-link {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted, #5a7090);
            text-decoration: none;
            letter-spacing: 0.04em;
            flex-shrink: 0;
            transition: color 0.2s;
        }
        .reader-nav-link:hover { color: #4FC3F7; }

        /* ПРОГРЕСС ЧТЕНИЯ */
        .read-progress {
            position: fixed;
            top: 52px;
            left: 0;
            height: 2px;
            width: 0%;
            background: linear-gradient(90deg, #4FC3F7, #7C4DFF);
            z-index: 101;
            transition: width 0.1s;
        }

        /* МЕТАДАННЫЕ СТАТЬИ */
        .article-meta {
            max-width: var(--reader-max);
            margin: 40px auto 0;
            padding: 0 24px;
        }

        .meta-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4FC3F7;
            margin-bottom: 14px;
        }

        .article-title {
            font-family: 'Unbounded', sans-serif;
            font-size: clamp(22px, 4vw, 36px);
            font-weight: 700;
            line-height: 1.25;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
        }

        .article-annotation {
            font-size: 16px;
            line-height: 1.65;
            color: var(--muted, #5a7090);
            font-style: italic;
            border-left: 3px solid #4FC3F7;
            padding-left: 16px;
            margin-bottom: 20px;
        }

        .meta-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(79, 195, 247, 0.1);
            margin-bottom: 0;
        }

        .meta-item {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted, #5a7090);
            letter-spacing: 0.04em;
        }

        /* КЛЮЧЕВЫЕ СЛОВА */
        .kw-section {
            max-width: var(--reader-max);
            margin: 14px auto 0;
            padding: 0 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            align-items: center;
        }

        .kw-lbl {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted, #5a7090);
        }

        .kw-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            background: rgba(79, 195, 247, 0.07);
            border: 1px solid rgba(79, 195, 247, 0.18);
            border-radius: 4px;
            padding: 3px 9px;
            color: #4FC3F7;
            letter-spacing: 0.03em;
        }

        /* КОНТЕНТ СТАТЬИ — используем article из styles.css */
        /* reader.html добавляет только специфику */

        /* СОСТОЯНИЕ ЗАГРУЗКИ */
        .loading-state, .error-state {
            max-width: var(--reader-max);
            margin: 80px auto;
            padding: 0 24px;
            text-align: center;
        }

        .loading-spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(79, 195, 247, 0.2);
            border-top-color: #4FC3F7;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--muted, #5a7090);
        }

        .error-icon { font-size: 36px; margin-bottom: 16px; }

        .error-title {
            font-family: 'Unbounded', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #e0dbd0;
            margin-bottom: 10px;
        }

        .error-sub {
            font-size: 14px;
            color: var(--muted, #5a7090);
            margin-bottom: 24px;
        }

        .btn-back {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            background: rgba(79, 195, 247, 0.1);
            border: 1px solid rgba(79, 195, 247, 0.25);
            border-radius: 8px;
            padding: 10px 20px;
            color: #4FC3F7;
            text-decoration: none;
            display: inline-block;
        }

        /* ПОДЕЛИТЬСЯ */
        .share-bar {
            max-width: var(--reader-max);
            margin: 40px auto 0;
            padding: 24px;
            border-top: 1px solid rgba(79, 195, 247, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .share-lbl {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted, #5a7090);
        }

        .share-btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            background: rgba(79, 195, 247, 0.07);
            border: 1px solid rgba(79, 195, 247, 0.18);
            border-radius: 6px;
            padding: 5px 14px;
            color: #4FC3F7;
            cursor: pointer;
            transition: all 0.2s;
        }
        .share-btn:hover { background: rgba(79, 195, 247, 0.15); }
        .share-btn.copied { color: #66BB6A; border-color: #66BB6A; }

        /* АДАПТИВ */
        @media (max-width: 600px) {
            .article-meta, .kw-section, .share-bar {
                padding: 0 16px;
            }
            .reader-nav { padding: 0 16px; }
        }
    </style>
</head>
<body data-theme="dark">

    <!-- КИМ-дисплей (из styles.css) -->
    <div id="kim-display" title="Когнитивный Индекс Момента — CogneeAI адаптирует текст">КИМ: —</div>
    <a id="dash-link" href="dashboard.html" title="Когнитивный профиль">📊</a>
    <a id="profile-link" href="profile.html" title="Профиль">👤</a>

    <!-- ПРОГРЕСС ЧТЕНИЯ -->
    <div class="read-progress" id="read-progress"></div>

    <!-- НАВИГАЦИЯ -->
    <nav class="reader-nav">
        <a class="reader-nav-logo" href="index.html">Cognee</a>
        <span class="reader-nav-title" id="nav-title">Загрузка...</span>
        <a class="reader-nav-link" href="editor.html">+ Написать</a>
    </nav>

    <!-- LOADING -->
    <div class="loading-state" id="loading-state">
        <div class="loading-spinner"></div>
        <div class="loading-text">Загружаем статью...</div>
    </div>

    <!-- ERROR -->
    <div class="error-state" id="error-state" style="display:none">
        <div class="error-icon">📭</div>
        <div class="error-title">Статья не найдена</div>
        <div class="error-sub">Возможно, ссылка устарела или статья была удалена</div>
        <a class="btn-back" href="index.html">← Вернуться на главную</a>
    </div>

    <!-- МЕТАДАННЫЕ -->
    <div class="article-meta" id="article-meta" style="display:none">
        <div class="meta-badge">📄 Статья</div>
        <h1 class="article-title" id="meta-title"></h1>
        <div class="article-annotation" id="meta-annotation" style="display:none"></div>
        <div class="meta-row">
            <span class="meta-item" id="meta-author"></span>
            <span class="meta-item" id="meta-date"></span>
            <span class="meta-item" id="meta-read"></span>
        </div>
    </div>

    <!-- КЛЮЧЕВЫЕ СЛОВА -->
    <div class="kw-section" id="kw-section" style="display:none">
        <span class="kw-lbl">теги:</span>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ СТАТЬИ -->
    <div class="article" id="article-content" style="display:none">
        <main id="article-main"></main>
    </div>

    <!-- ПОДЕЛИТЬСЯ -->
    <div class="share-bar" id="share-bar" style="display:none">
        <span class="share-lbl">Поделиться:</span>
        <button class="share-btn" id="btn-copy-link" onclick="copyArticleLink()">🔗 Скопировать ссылку</button>
        <button class="share-btn" onclick="shareToTelegram()">✈ Telegram</button>
    </div>

    <!-- СКРИПТЫ -->
    <script src="config.js" onerror="console.warn('[Cognee] config.js не найден')"></script>
    <script src="storage.js"></script>
    <script src="supabase.js"></script>
    <script src="gemini.js"></script>
    <script src="sensor.js"></script>
    <script src="adapter.js"></script>

    <script>
    // reader.js inline — v8.3
    // Загружает статью по ?id=, рендерит с CogneeAI адаптацией
    (function(){
    'use strict';

    let currentArticle = null;

    // ── INIT ──────────────────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', async () => {
        const params = new URLSearchParams(location.search);
        const id     = params.get('id');

        if (!id) { showError(); return; }

        try {
            const article = await loadArticle(id);
            if (!article) { showError(); return; }
            currentArticle = article;
            renderArticle(article);
            setupReadProgress();
        } catch(e) {
            console.error('[Reader] Ошибка загрузки:', e);
            showError();
        }
    });

    // ── ЗАГРУЗКА ──────────────────────────────────────────────────────────────
    async function loadArticle(id) {
        // 1. Сначала пробуем Supabase
        if (window.CogneeSupabase) {
            try {
                await window.CogneeSupabase.init();
                const article = await window.CogneeSupabase.getArticleById(id);
                if (article) return article;
            } catch(e) {
                console.warn('[Reader] Supabase недоступен, пробуем локально:', e.message);
            }
        }

        // 2. Fallback: localStorage
        try {
            const all = JSON.parse(localStorage.getItem('cognee_articles') || '{}');
            if (all[id]) return all[id];
        } catch(e) {}

        return null;
    }

    // ── РЕНДЕР ────────────────────────────────────────────────────────────────
    function renderArticle(article) {
        // Скрываем загрузку
        document.getElementById('loading-state').style.display = 'none';

        // Заголовок в навигации
        document.title = `${article.title} — Cognee`;
        document.getElementById('nav-title').textContent = article.title;

        // Метаданные
        document.getElementById('meta-title').textContent = article.title;

        if (article.annotation) {
            const annEl = document.getElementById('meta-annotation');
            annEl.textContent = article.annotation;
            annEl.style.display = 'block';
        }

        // Автор и дата
        document.getElementById('meta-author').textContent =
            '👤 ' + (article.author_name || 'Автор');

        if (article.published_at) {
            const d = new Date(article.published_at);
            document.getElementById('meta-date').textContent =
                '📅 ' + d.toLocaleDateString('ru-RU', {day:'numeric', month:'long', year:'numeric'});
        }

        const words = (article.content || '').trim().split(/\s+/).length;
        const readMin = Math.max(1, Math.round(words / 200));
        document.getElementById('meta-read').textContent = `⏱ ${readMin} мин чтения`;

        document.getElementById('article-meta').style.display = 'block';

        // Ключевые слова
        if (article.keywords && article.keywords.length) {
            const kwSection = document.getElementById('kw-section');
            article.keywords.forEach(kw => {
                const tag = document.createElement('span');
                tag.className = 'kw-tag';
                tag.textContent = kw;
                kwSection.appendChild(tag);
            });
            kwSection.style.display = 'flex';
        }

        // Контент
        const main = document.getElementById('article-main');
        const simplifiedMap = buildSimplifiedMap(article.content_simple);
        const paragraphs = (article.content || '').split(/\n\s*\n/).filter(p => p.trim());

        paragraphs.forEach(para => {
            const trimmed = para.trim();
            const el = renderParagraph(trimmed, simplifiedMap);
            if (el) main.appendChild(el);
        });

        document.getElementById('article-content').style.display = 'block';
        document.getElementById('share-bar').style.display = 'flex';

        // Запускаем CogneeAI адаптацию (из adapter.js)
        if (window.CogneeAdapter) {
            window.CogneeAdapter.init();
        }
    }

    function buildSimplifiedMap(contentSimpleJson) {
        const map = {};
        if (!contentSimpleJson) return map;
        try {
            const arr = JSON.parse(contentSimpleJson);
            if (Array.isArray(arr)) {
                arr.forEach(item => {
                    if (item.original && item.simplified && item.original !== item.simplified) {
                        map[item.original.trim()] = item.simplified;
                    }
                });
            }
        } catch(e) {}
        return map;
    }

    function renderParagraph(text, simplifiedMap) {
        // Заголовок H2
        if (text.startsWith('## ')) {
            const h = document.createElement('h2');
            h.textContent = text.slice(3);
            return h;
        }
        // Заголовок H3
        if (text.startsWith('### ')) {
            const h = document.createElement('h3');
            h.textContent = text.slice(4);
            return h;
        }
        // H1
        if (text.startsWith('# ')) {
            const h = document.createElement('h2');
            h.textContent = text.slice(2);
            return h;
        }
        // Разделитель
        if (text === '---') {
            return document.createElement('hr');
        }
        // Цитата
        if (text.startsWith('> ')) {
            const bq = document.createElement('blockquote');
            bq.textContent = text.slice(2);
            return bq;
        }
        // Список
        if (text.startsWith('- ')) {
            const ul = document.createElement('ul');
            text.split('\n').forEach(line => {
                if (line.startsWith('- ')) {
                    const li = document.createElement('li');
                    li.textContent = line.slice(2);
                    ul.appendChild(li);
                }
            });
            return ul;
        }

        // Обычный абзац с парой full/simple
        const wrap = document.createElement('div');
        wrap.className = 'para-block';

        const full = document.createElement('p');
        full.className = 'para-full';
        full.innerHTML = markupInline(text); // bold, italic
        wrap.appendChild(full);

        const simplified = simplifiedMap[text];
        if (simplified) {
            const simple = document.createElement('p');
            simple.className = 'para-simple';
            simple.style.display = 'none';
            simple.textContent = simplified;
            wrap.appendChild(simple);
        }

        return wrap;
    }

    // Минимальная инлайн разметка: **bold**, _italic_
    function markupInline(text) {
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/_(.+?)_/g, '<em>$1</em>');
    }

    // ── ПРОГРЕСС ЧТЕНИЯ ───────────────────────────────────────────────────────
    function setupReadProgress() {
        const bar = document.getElementById('read-progress');
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
            bar.style.width = Math.min(100, pct) + '%';
        }, { passive: true });
    }

    // ── ОШИБКА ────────────────────────────────────────────────────────────────
    function showError() {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('error-state').style.display   = 'block';
    }

    // ── ПОДЕЛИТЬСЯ ────────────────────────────────────────────────────────────
    window.copyArticleLink = function() {
        navigator.clipboard.writeText(location.href).then(() => {
            const btn = document.getElementById('btn-copy-link');
            btn.textContent = '✓ Скопировано!';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = '🔗 Скопировать ссылку';
                btn.classList.remove('copied');
            }, 2500);
        }).catch(() => {});
    };

    window.shareToTelegram = function() {
        const text = encodeURIComponent((currentArticle?.title || 'Статья') + ' — Cognee');
        const url  = encodeURIComponent(location.href);
        window.open(`https://t.me/share/url?url=${url}&text=${text}`, '_blank');
    };

    })();
    </script>
</body>
</html>
