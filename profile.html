<!-- profile.html — v9.2 | Глобальная версия: 9.2 -->
<!--
  Изменения v9.2:
  - Проверка уникальности имени в реальном времени (debounce 600ms)
  - Подсказка под полем: ✓ Имя свободно / ✗ Имя занято / ⚠ Зарезервировано
  - saveProfileName(): async-проверка через CogneeSupabase.checkNameAvailable()
    перед отправкой — не даёт сохранить занятое имя
  - Кнопка «Сохранить» неактивна пока имя не проверено или занято
-->
<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognee — Профиль</title>

    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:       #0a0e17;
            --surface:  #10161f;
            --surface2: #141c28;
            --border:   rgba(79,195,247,0.12);
            --border2:  rgba(79,195,247,0.28);
            --text:     #e0dbd0;
            --muted:    #5a7090;
            --accent:   #4FC3F7;
            --accent2:  #7C4DFF;
            --success:  #66BB6A;
            --warn:     #FFB74D;
            --danger:   #EF5350;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Lora', Georgia, serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        body::before {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
            background: radial-gradient(ellipse 60% 40% at 20% 0%, rgba(79,195,247,.05) 0%,transparent 60%),
                        radial-gradient(ellipse 50% 50% at 80% 100%, rgba(124,77,255,.04) 0%,transparent 60%);
        }

        /* NAV */
        .nav {
            position:sticky; top:0; z-index:100;
            background:rgba(10,14,23,.93); backdrop-filter:blur(12px);
            border-bottom:1px solid var(--border);
            padding:0 32px; height:56px; display:flex; align-items:center; gap:20px;
        }
        .nav-logo { font-family:'Unbounded',sans-serif; font-size:15px; font-weight:700; color:var(--accent); text-decoration:none; letter-spacing:-.02em; }
        .nav-sep  { flex:1; }
        .nav-link { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); text-decoration:none; letter-spacing:.04em; transition:color .2s; }
        .nav-link:hover  { color:var(--text); }
        .nav-link.active { color:var(--accent); }

        /* MAIN */
        .profile-wrap { position:relative; z-index:1; max-width:860px; margin:0 auto; padding:48px 24px 100px; }

        /* AUTH GUARD */
        .auth-guard { text-align:center; padding:80px 20px; background:var(--surface); border:1px solid var(--border); border-radius:16px; }
        .auth-guard-title { font-family:'Unbounded',sans-serif; font-size:20px; font-weight:700; margin-bottom:8px; }
        .auth-guard-sub   { font-size:14px; color:var(--muted); margin-bottom:24px; }
        .btn-auth { display:inline-block; padding:11px 28px; border-radius:10px; font-size:13px; font-family:'JetBrains Mono',monospace; font-weight:700; background:var(--accent); color:#0a0e17; text-decoration:none; }

        /* PROFILE CARD */
        .profile-card {
            background:var(--surface); border:1px solid var(--border); border-radius:16px;
            padding:28px; margin-bottom:32px;
            display:flex; align-items:center; gap:20px; flex-wrap:wrap;
        }
        .profile-avatar {
            width:64px; height:64px; border-radius:50%; flex-shrink:0;
            background:linear-gradient(135deg,rgba(79,195,247,.2),rgba(124,77,255,.2));
            border:2px solid rgba(79,195,247,.3);
            display:flex; align-items:center; justify-content:center;
            font-size:26px; font-family:'Unbounded',sans-serif; color:var(--accent);
        }
        .profile-info { flex:1; min-width:0; }
        .profile-name { font-family:'Unbounded',sans-serif; font-size:20px; font-weight:700; letter-spacing:-.02em; margin-bottom:4px; }
        .profile-email { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); }
        .profile-actions { display:flex; gap:10px; flex-wrap:wrap; }
        .btn-sm {
            padding:7px 16px; border-radius:8px; font-size:12px; font-family:'JetBrains Mono',monospace;
            border:1px solid; cursor:pointer; text-decoration:none; transition:all .15s; display:inline-block;
        }
        .btn-edit-profile { background:none; color:var(--accent); border-color:rgba(79,195,247,.3); }
        .btn-edit-profile:hover { background:rgba(79,195,247,.1); }
        .btn-logout { background:none; color:var(--danger); border-color:rgba(239,83,80,.3); }
        .btn-logout:hover { background:rgba(239,83,80,.1); }

        /* EDIT PROFILE FORM */
        .edit-profile-form {
            display:none; background:var(--surface2); border:1px solid var(--border);
            border-radius:12px; padding:20px; margin-bottom:24px;
        }
        .edit-profile-form.vis { display:block; }
        .edit-field { margin-bottom:14px; }
        .edit-label {
            display:block; font-family:'JetBrains Mono',monospace; font-size:11px;
            color:var(--muted); letter-spacing:.06em; margin-bottom:6px;
        }
        .edit-input {
            width:100%; padding:9px 14px;
            background:rgba(255,255,255,.04);
            border:1px solid rgba(79,195,247,.15);
            border-radius:8px; color:var(--text);
            font-family:'Lora',Georgia,serif; font-size:14px; outline:none;
            transition:border-color .2s, box-shadow .2s;
        }
        .edit-input:focus { border-color:rgba(79,195,247,.5); box-shadow:0 0 0 3px rgba(79,195,247,.08); }
        .edit-input.name-ok    { border-color: rgba(102,187,106,.5); }
        .edit-input.name-taken { border-color: rgba(239,83,80,.5); }
        .edit-input.name-checking { border-color: rgba(255,183,77,.4); }

        /* ── Подсказка под полем имени ── */
        .name-check-hint {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.03em;
            min-height: 16px;
            transition: opacity 0.2s;
        }
        .name-check-hint.hidden  { opacity: 0; }
        .name-check-hint.ok      { color: #66BB6A; }
        .name-check-hint.taken   { color: #EF5350; }
        .name-check-hint.warn    { color: #FFB74D; }
        .name-check-hint.loading { color: var(--muted); }

        .name-char-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px; color: var(--muted);
            text-align: right; margin-top: 4px;
        }
        .name-char-count.warn { color: #FFB74D; }

        .edit-btns { display:flex; gap:10px; margin-top: 4px; }
        .btn-save-profile {
            padding:8px 18px; border-radius:8px; font-size:12px;
            font-family:'JetBrains Mono',monospace;
            background:rgba(79,195,247,.12); color:var(--accent);
            border:1px solid rgba(79,195,247,.3); cursor:pointer;
            transition:background .15s, opacity .15s;
        }
        .btn-save-profile:hover:not(:disabled) { background:rgba(79,195,247,.22); }
        .btn-save-profile:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-cancel-edit  {
            padding:8px 18px; border-radius:8px; font-size:12px;
            font-family:'JetBrains Mono',monospace;
            background:none; color:var(--muted);
            border:1px solid rgba(255,255,255,.1); cursor:pointer;
        }

        /* СЕКЦИЯ СТАТЕЙ */
        .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
        .section-title  { font-family:'Unbounded',sans-serif; font-size:16px; font-weight:700; letter-spacing:-.02em; }
        .btn-write-article {
            padding:8px 16px; border-radius:8px; font-size:12px; font-family:'JetBrains Mono',monospace;
            font-weight:700; background:var(--accent); color:#0a0e17; border:none; cursor:pointer;
            text-decoration:none; display:inline-block;
        }

        /* КАРТОЧКИ СТАТЕЙ */
        .articles-list { display:flex; flex-direction:column; gap:12px; }

        .my-article-card {
            background:var(--surface); border:1px solid var(--border);
            border-radius:12px; padding:18px 20px;
            transition:border-color .2s;
        }
        .my-article-card:hover { border-color:var(--border2); }

        .mac-head { display:flex; align-items:flex-start; gap:10px; margin-bottom:8px; }
        .mac-title {
            font-family:'Unbounded',sans-serif; font-size:14px; font-weight:700;
            letter-spacing:-.02em; flex:1; min-width:0; line-height:1.3;
            text-decoration:none; color:var(--text); cursor:pointer;
        }
        .mac-title:hover { color:var(--accent); }
        .mac-actions-wrap { flex-shrink:0; display:flex; align-items:center; }

        .mac-annotation {
            font-size:13px; color:var(--muted); line-height:1.55; font-style:italic; margin-bottom:10px;
            display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
        }
        .mac-footer { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
        .mac-meta   { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); }
        .mac-badge  {
            font-family:'JetBrains Mono',monospace; font-size:10px; padding:2px 8px;
            border-radius:4px; letter-spacing:.04em;
        }
        .mac-badge.pub   { background:rgba(102,187,106,.12); color:#66BB6A; border:1px solid rgba(102,187,106,.3); }
        .mac-badge.priv  { background:rgba(79,195,247,.1); color:var(--accent); border:1px solid rgba(79,195,247,.3); }
        .mac-badge.draft { background:rgba(255,183,77,.12); color:var(--warn); border:1px solid rgba(255,183,77,.3); }

        /* ПУСТЫЕ СОСТОЯНИЯ */
        .no-articles { text-align:center; padding:60px 20px; background:var(--surface); border:1px dashed var(--border); border-radius:14px; }
        .no-articles-icon  { font-size:48px; margin-bottom:14px; }
        .no-articles-title { font-family:'Unbounded',sans-serif; font-size:18px; font-weight:700; margin-bottom:8px; }
        .no-articles-sub   { font-size:14px; color:var(--muted); margin-bottom:24px; line-height:1.6; }

        /* SPINNER */
        .spinner-wrap { text-align:center; padding:40px; }
        .spinner { width:32px; height:32px; border:3px solid rgba(79,195,247,.15); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ИЗБРАННОЕ */
        .favorites-section { margin-top:40px; }

        @media(max-width:600px){
            .nav { padding:0 16px; gap:14px; }
            .profile-wrap { padding:28px 16px 80px; }
            .profile-card { flex-direction:column; gap:14px; }
        }
    </style>
</head>

<script src="config.js" onerror="console.warn('[Cognee] config.js не найден')"></script>
<script src="storage.js"></script>
<script src="supabase.js"></script>
<script src="article-actions.js"></script>
<script>
// profile.js inline — v9.2
(function(){
'use strict';

let _currentUser    = null;
let _nameCheckTimer = null;  // debounce таймер для проверки имени
let _nameStatus     = null;  // 'ok' | 'taken' | 'warn' | 'loading' | null

window.addEventListener('DOMContentLoaded', async () => {
    CogneeActions.initToastContainer();

    if (!window.CogneeSupabase) { showAuthGuard(); return; }

    const ok = await CogneeSupabase.init();
    if (!ok || !CogneeSupabase.isAuthenticated()) {
        showAuthGuard(); return;
    }

    _currentUser = CogneeSupabase.getCurrentUser();
    renderProfileCard(_currentUser);
    document.getElementById('profile-content').style.display = 'block';

    // Слушаем ввод имени — проверка уникальности с задержкой
    const nameInput = document.getElementById('edit-name');
    nameInput.addEventListener('input', onNameInput);

    await Promise.all([loadMyArticles(), loadFavorites()]);
});

// ── ПРОФИЛЬ ───────────────────────────────────────────────────────────────────
function renderProfileCard(user) {
    const name  = user.display_name || user.email?.split('@')[0] || 'Читатель';
    document.getElementById('profile-name').textContent  = name;
    document.getElementById('profile-email').textContent = user.email || '';
    document.getElementById('profile-avatar').textContent = name.charAt(0).toUpperCase();
    document.getElementById('edit-name').value = name;
    document.getElementById('name-char-count').textContent = name.length + ' / 30';
    document.title = name + ' — Cognee';
}

window.toggleEditForm = function() {
    const form = document.getElementById('edit-profile-form');
    const isOpening = !form.classList.contains('vis');
    form.classList.toggle('vis');

    if (isOpening) {
        // При открытии — сбрасываем статус и проверяем текущее имя
        const nameInput = document.getElementById('edit-name');
        const currentName = _currentUser?.display_name || '';
        nameInput.value = currentName;
        setNameHint('hidden', '');
        setNameInputState('');
        document.getElementById('btn-save-name').disabled = true;
        nameInput.focus();
    }
};

// ── LIVE-ПРОВЕРКА ИМЕНИ ───────────────────────────────────────────────────────

function onNameInput() {
    const input = document.getElementById('edit-name');
    const value = input.value.trim();
    const count = input.value.length;

    // Счётчик символов
    const counter = document.getElementById('name-char-count');
    counter.textContent = count + ' / 30';
    counter.className   = 'name-char-count' + (count > 25 ? ' warn' : '');

    // Если имя не изменилось — разрешаем сохранить без проверки
    if (value === (_currentUser?.display_name || '').trim()) {
        setNameHint('ok', '✓ Это твоё текущее имя');
        setNameInputState('ok');
        document.getElementById('btn-save-name').disabled = false;
        _nameStatus = 'ok';
        return;
    }

    // Базовые проверки без сети
    if (value.length < 2) {
        setNameHint('warn', '⚠ Минимум 2 символа');
        setNameInputState('taken');
        document.getElementById('btn-save-name').disabled = true;
        _nameStatus = 'warn';
        return;
    }

    // Запускаем debounce-проверку через API
    clearTimeout(_nameCheckTimer);
    setNameHint('loading', '⏳ Проверяем доступность…');
    setNameInputState('checking');
    document.getElementById('btn-save-name').disabled = true;
    _nameStatus = 'loading';

    _nameCheckTimer = setTimeout(() => checkNameDebounced(value), 600);
}

async function checkNameDebounced(name) {
    if (!window.CogneeSupabase?.checkNameAvailable) return;

    try {
        const result = await CogneeSupabase.checkNameAvailable(name, _currentUser?.id);

        if (result.available) {
            setNameHint('ok', '✓ Имя свободно');
            setNameInputState('ok');
            document.getElementById('btn-save-name').disabled = false;
            _nameStatus = 'ok';
        } else {
            const msg = result.error || 'Имя недоступно';
            // Различаем зарезервированные и просто занятые
            const isReserved = msg.includes('зарезервировано') || msg.includes('reserved');
            setNameHint(isReserved ? 'warn' : 'taken', '✗ ' + msg);
            setNameInputState('taken');
            document.getElementById('btn-save-name').disabled = true;
            _nameStatus = 'taken';
        }
    } catch (e) {
        // При ошибке сети — разрешаем попытаться (сервер проверит сам)
        setNameHint('warn', '⚠ Не удалось проверить — попробуй сохранить');
        setNameInputState('');
        document.getElementById('btn-save-name').disabled = false;
        _nameStatus = 'warn';
    }
}

function setNameHint(type, text) {
    const hint = document.getElementById('name-check-hint');
    hint.textContent = text;
    hint.className = 'name-check-hint' + (type === 'hidden' ? ' hidden' : ' ' + type);
}

function setNameInputState(state) {
    const input = document.getElementById('edit-name');
    input.classList.remove('name-ok', 'name-taken', 'name-checking');
    if (state === 'ok')       input.classList.add('name-ok');
    if (state === 'taken')    input.classList.add('name-taken');
    if (state === 'checking') input.classList.add('name-checking');
}

// ── СОХРАНЕНИЕ ИМЕНИ ──────────────────────────────────────────────────────────

window.saveProfileName = async function() {
    const newName = document.getElementById('edit-name').value.trim();
    if (!newName) return;

    const btn = document.getElementById('btn-save-name');
    btn.disabled    = true;
    btn.textContent = 'Сохраняем…';

    try {
        // Финальная проверка уникальности перед отправкой
        // (на случай если пользователь быстро нажал до завершения debounce)
        if (window.CogneeSupabase?.checkNameAvailable) {
            const check = await CogneeSupabase.checkNameAvailable(newName, _currentUser?.id);
            if (!check.available) {
                setNameHint('taken', '✗ ' + (check.error || 'Имя недоступно'));
                setNameInputState('taken');
                btn.disabled    = false;
                btn.textContent = 'Сохранить';
                return;
            }
        }

        await CogneeSupabase.updateProfile({ display_name: newName });
        _currentUser.display_name = newName;
        renderProfileCard(_currentUser);
        document.getElementById('edit-profile-form').classList.remove('vis');
        setNameHint('hidden', '');
        setNameInputState('');
        CogneeActions.showToast('✓ Имя обновлено', 'ok');
    } catch (e) {
        // Разбираем серверную ошибку
        const msg = e.message || '';
        if (msg.includes('name_taken') || msg.includes('уже занято')) {
            setNameHint('taken', '✗ Это имя уже занято другим пользователем');
            setNameInputState('taken');
            CogneeActions.showToast('Имя уже занято', 'err');
        } else if (msg.includes('reserved_name') || msg.includes('зарезервировано')) {
            setNameHint('warn', '⚠ Это имя зарезервировано');
            setNameInputState('taken');
            CogneeActions.showToast('Имя зарезервировано', 'err');
        } else {
            CogneeActions.showToast('Ошибка: ' + msg, 'err');
        }
    }

    btn.disabled    = false;
    btn.textContent = 'Сохранить';
};

window.doLogout = async function() {
    try { await CogneeSupabase.signOut(); } finally { location.href = 'index.html'; }
};

// ── МОИ СТАТЬИ ────────────────────────────────────────────────────────────────
async function loadMyArticles() {
    const list = document.getElementById('articles-list');
    try {
        const articles = await CogneeSupabase.getUserArticlesFull();
        if (!articles || articles.length === 0) {
            list.innerHTML = `
                <div class="no-articles">
                    <div class="no-articles-icon">✍️</div>
                    <div class="no-articles-title">Статей пока нет</div>
                    <div class="no-articles-sub">Напиши свою первую статью — CogneeAI создаст упрощённую версию и аннотацию автоматически.</div>
                    <a class="btn-write-article" href="editor.html">+ Написать статью</a>
                </div>`;
            return;
        }
        list.innerHTML = '';
        articles.forEach(a => list.appendChild(buildMyCard(a)));
    } catch(e) {
        list.innerHTML = '<div style="padding:20px;color:var(--muted);font-size:13px">Ошибка загрузки статей</div>';
    }
}

function buildMyCard(a) {
    const wrap = document.createElement('div');
    wrap.className = 'my-article-card';
    wrap.id = 'my-card-' + a.id;

    const date = a.published_at
        ? new Date(a.published_at).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'})
        : '';
    const badgeCls = a.is_draft ? 'draft' : (a.visibility === 'private' ? 'priv' : 'pub');
    const badgeTxt = a.is_draft ? '📝 Черновик' : (a.visibility === 'private' ? '🔒 Приватная' : '🌐 Публичная');

    wrap.innerHTML = `
        <div class="mac-head">
            <a class="mac-title" href="reader.html?id=${a.id}">${_esc(a.title || 'Без названия')}</a>
            <div class="mac-actions-wrap" id="mac-act-${a.id}"></div>
        </div>
        ${a.annotation ? `<div class="mac-annotation">${_esc(a.annotation)}</div>` : ''}
        <div class="mac-footer">
            <span class="mac-meta">📅 ${date || 'Нет даты'}</span>
            <span class="mac-badge ${badgeCls}">${badgeTxt}</span>
        </div>`;

    requestAnimationFrame(() => {
        const target = wrap.querySelector('#mac-act-' + a.id);
        if (!target) return;
        CogneeActions.mountMenu(target, {
            articleId:    a.id,
            articleTitle: a.title || 'Статья',
            articleUrl:   'reader.html?id=' + a.id,
            isOwner:      true,
            noReport:     true,
            onDelete:     () => {
                const card = document.getElementById('my-card-' + a.id);
                if (card) {
                    card.style.transition = 'opacity 0.3s, max-height 0.3s';
                    card.style.opacity    = '0';
                    card.style.maxHeight  = '0';
                    setTimeout(() => card.remove(), 300);
                }
            },
        });
    });

    return wrap;
}

// ── ИЗБРАННОЕ ─────────────────────────────────────────────────────────────────
async function loadFavorites() {
    const list = document.getElementById('favorites-list');
    try {
        const favs = await CogneeSupabase.getFavorites();
        if (!favs || favs.length === 0) {
            list.innerHTML = `
                <div class="no-articles" style="padding:32px 20px">
                    <div class="no-articles-icon">☆</div>
                    <div class="no-articles-title" style="font-size:16px">Избранное пусто</div>
                    <div class="no-articles-sub">Нажми ⋮ на любой статье и добавь её в избранное</div>
                </div>`;
            return;
        }

        list.innerHTML = '';
        favs.forEach(fav => {
            const a         = fav.articles || {};
            const articleId = fav.article_id;
            if (!articleId) return;

            const wrap = document.createElement('div');
            wrap.className = 'my-article-card';
            wrap.id = 'fav-card-' + fav.id;

            const date = a.published_at
                ? new Date(a.published_at).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'})
                : '';

            wrap.innerHTML = `
                <div class="mac-head">
                    <a class="mac-title" href="reader.html?id=${articleId}">${_esc(a.title || 'Статья #' + articleId)}</a>
                    <div class="mac-actions-wrap" id="fav-act-${fav.id}"></div>
                </div>
                ${a.annotation ? `<div class="mac-annotation">${_esc(a.annotation)}</div>` : ''}
                <div class="mac-footer">
                    <span class="mac-meta">📅 ${date || '—'}</span>
                    <span class="mac-badge pub">★ Избранное</span>
                </div>`;

            requestAnimationFrame(() => {
                const target = wrap.querySelector('#fav-act-' + fav.id);
                if (!target) return;
                CogneeActions.mountMenu(target, {
                    articleId, articleTitle: a.title || 'Статья',
                    articleUrl: 'reader.html?id=' + articleId,
                    isOwner: false, noReport: false,
                    onFavChange: (isFav) => {
                        if (!isFav) {
                            wrap.style.transition = 'opacity 0.3s';
                            wrap.style.opacity    = '0';
                            setTimeout(() => wrap.remove(), 300);
                        }
                    },
                });
            });

            list.appendChild(wrap);
        });
    } catch(e) {
        list.innerHTML = '<div style="padding:20px;color:var(--muted);font-size:13px">Ошибка загрузки избранного</div>';
    }
}

// ── УТИЛИТЫ ───────────────────────────────────────────────────────────────────
function showAuthGuard() {
    document.getElementById('auth-guard').style.display = 'block';
}

function _esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

})();
</script>
