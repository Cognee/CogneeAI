<!-- profile.html — v8.2 | Глобальная версия: 8.2 -->
<!-- Блок 2: Личный кабинет. КИМ-профиль, история из Supabase, выход. -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognee — Профиль</title>

    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:       #0f0f0f;
            --surface:  #131820;
            --surface2: #0d1117;
            --border:   rgba(79,195,247,0.15);
            --text:     #e8e0d0;
            --muted:    #6a8099;
            --accent:   #4FC3F7;
            --accent2:  #7C4DFF;
            --focus:    #4FC3F7;
            --normal:   #81C784;
            --tired:    #FFB74D;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Lora', Georgia, serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0 0 80px;
        }

        /* ─── Шапка ─── */
        .profile-header {
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .profile-header-logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #4FC3F7, #7C4DFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-link {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-decoration: none;
            padding: 7px 14px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            transition: color 0.2s, border-color 0.2s;
            cursor: pointer;
            background: none;
        }

        .btn-link:hover {
            color: var(--accent);
            border-color: rgba(79,195,247,0.4);
        }

        .btn-signout {
            color: #ef9a9a;
            border-color: rgba(239,83,80,0.2);
        }

        .btn-signout:hover {
            color: #ef5350;
            border-color: rgba(239,83,80,0.5);
        }

        /* ─── Основной контент ─── */
        .profile-body {
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* ─── Карточка пользователя ─── */
        .user-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .user-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4FC3F722, #7C4DFF22);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .user-info { flex: 1; }

        .user-name {
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .user-email {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--muted);
        }

        .user-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 600;
            color: var(--accent);
            background: rgba(79,195,247,0.1);
            border: 1px solid rgba(79,195,247,0.25);
            border-radius: 12px;
            padding: 3px 10px;
            margin-top: 8px;
            display: inline-block;
            letter-spacing: 0.06em;
        }

        /* ─── Секции ─── */
        .section-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        /* ─── Статистика КИМ (3 карточки) ─── */
        .kim-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .kim-stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .kim-stat-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .kim-stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px;
            font-weight: 600;
            line-height: 1;
        }

        .kim-stat-value.focus  { color: var(--focus); }
        .kim-stat-value.normal { color: var(--normal); }
        .kim-stat-value.tired  { color: var(--tired); }
        .kim-stat-value.neutral { color: var(--text); }

        .kim-stat-sub {
            font-size: 12px;
            color: var(--muted);
            margin-top: 6px;
            font-style: italic;
        }

        /* ─── График часов ─── */
        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 28px;
        }

        .chart-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.06em;
            margin-bottom: 20px;
        }

        .hour-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 80px;
        }

        .hour-bar-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            height: 100%;
            justify-content: flex-end;
        }

        .hour-bar {
            width: 100%;
            min-height: 3px;
            border-radius: 2px 2px 0 0;
            transition: height 0.6s ease;
        }

        .hour-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 8px;
            color: var(--muted);
        }

        /* ─── Синхронизация ─── */
        .sync-status {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .sync-info {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text);
        }

        .sync-sub {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
        }

        .btn-sync {
            background: linear-gradient(135deg, #4FC3F7, #7C4DFF);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            padding: 10px 20px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .btn-sync:hover  { opacity: 0.9; }
        .btn-sync:active { transform: scale(0.97); }
        .btn-sync:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ─── Не авторизован ─── */
        .auth-prompt {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 32px;
            text-align: center;
        }

        .auth-prompt-emoji { font-size: 48px; margin-bottom: 16px; }
        .auth-prompt-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .auth-prompt-sub { color: var(--muted); font-size: 15px; margin-bottom: 28px; font-style: italic; }

        .btn-primary {
            display: inline-block;
            background: linear-gradient(135deg, #4FC3F7, #7C4DFF);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            padding: 14px 32px;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.9; }

        /* ─── Загрузка ─── */
        .loading {
            text-align: center;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            padding: 60px 0;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(79,195,247,0.2);
            border-top-color: #4FC3F7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header class="profile-header">
    <a class="profile-header-logo" href="index.html">Cognee</a>
    <div class="header-actions">
        <a class="btn-link" href="index.html">← Читать</a>
        <a class="btn-link" href="dashboard.html">📊 Дашборд</a>
        <button class="btn-link btn-signout" id="signout-btn" onclick="handleSignOut()" style="display:none">Выйти</button>
    </div>
</header>

<main class="profile-body" id="profile-main">
    <div class="loading" id="loading-state">
        <div class="spinner"></div><br>Загружаем профиль…
    </div>
</main>

<script src="config.js" onerror="console.warn('[Cognee] config.js не найден')"></script>
<script src="storage.js"></script>
<script src="supabase.js"></script>
<script>
(async function () {
    const main = document.getElementById('profile-main');
    const signoutBtn = document.getElementById('signout-btn');

    // Инициализируем Supabase
    const hasSupabase = !!(window.COGNEE_SUPABASE_URL && window.COGNEE_SUPABASE_KEY);

    if (hasSupabase) {
        await CogneeSupabase.init();
    }

    const isAuth = hasSupabase && CogneeSupabase.isAuthenticated();

    if (!isAuth) {
        _renderGuest(main, hasSupabase);
        return;
    }

    signoutBtn.style.display = 'inline-block';
    _renderProfile(main, CogneeSupabase.getUser());
})();

// ─── Рендер гостя ────────────────────────────────────────────────────────
function _renderGuest(main, hasSupabase) {
    main.innerHTML = `
        <div class="auth-prompt">
            <div class="auth-prompt-emoji">🔐</div>
            <div class="auth-prompt-title">Войди, чтобы сохранить прогресс</div>
            <div class="auth-prompt-sub">
                ${hasSupabase
                    ? 'Твоя история КИМ, лучшие часы чтения и профиль хранятся в облаке.'
                    : 'Supabase не настроен. Добавь ключи в config.js для работы авторизации.'}
            </div>
            <a class="btn-primary" href="auth.html">Войти / Зарегистрироваться</a>
        </div>
    `;
}

// ─── Рендер профиля ───────────────────────────────────────────────────────
function _renderProfile(main, user) {
    const history     = window.CogneeStorage ? window.CogneeStorage.getHistory() : [];
    const hourlyStats = window.CogneeStorage ? window.CogneeStorage.getHourlyStats() : new Array(24).fill(0);
    const bestHour    = window.CogneeStorage ? window.CogneeStorage.getBestHour() : -1;
    const worstHour   = window.CogneeStorage ? window.CogneeStorage.getWorstHour() : -1;

    // Средний КИМ
    const avgKIM = history.length > 0
        ? Math.round(history.reduce((s, r) => s + r.kim, 0) / history.length)
        : null;

    const kimClass = avgKIM === null ? 'neutral'
        : avgKIM > 70 ? 'focus'
        : avgKIM >= 40 ? 'normal'
        : 'tired';

    const kimZoneLabel = avgKIM === null ? '—'
        : avgKIM > 70 ? 'Поток'
        : avgKIM >= 40 ? 'Норма'
        : 'Усталость';

    // Распределение зон
    const zones = { focus: 0, normal: 0, tired: 0 };
    history.forEach(r => { if (zones[r.zone] !== undefined) zones[r.zone]++; });
    const total = history.length || 1;
    const focusPct  = Math.round(zones.focus  / total * 100);
    const normalPct = Math.round(zones.normal / total * 100);
    const tiredPct  = Math.round(zones.tired  / total * 100);

    // Инициалы для аватара
    const initials = (user.display_name || user.email || '?').charAt(0).toUpperCase();

    main.innerHTML = `
        <!-- Пользователь -->
        <div class="user-card">
            <div class="user-avatar">${initials}</div>
            <div class="user-info">
                <div class="user-name">${_esc(user.display_name || 'Читатель')}</div>
                <div class="user-email">${_esc(user.email || '')}</div>
                <div class="user-badge">☁ Синхронизировано с Supabase</div>
            </div>
        </div>

        <!-- КИМ-статистика -->
        <div class="section-title">Когнитивный профиль</div>
        <div class="kim-stats">
            <div class="kim-stat-card">
                <div class="kim-stat-label">Средний КИМ</div>
                <div class="kim-stat-value ${kimClass}">${avgKIM !== null ? avgKIM : '—'}</div>
                <div class="kim-stat-sub">${kimZoneLabel}</div>
            </div>
            <div class="kim-stat-card">
                <div class="kim-stat-label">Записей</div>
                <div class="kim-stat-value neutral">${history.length}</div>
                <div class="kim-stat-sub">сессий измерено</div>
            </div>
            <div class="kim-stat-card">
                <div class="kim-stat-label">Лучшее время</div>
                <div class="kim-stat-value focus">${bestHour >= 0 ? bestHour + ':00' : '—'}</div>
                <div class="kim-stat-sub">${worstHour >= 0 ? 'хуже в ' + worstHour + ':00' : 'данных нет'}</div>
            </div>
        </div>

        <!-- Распределение зон -->
        <div class="chart-card">
            <div class="chart-title">РАСПРЕДЕЛЕНИЕ ЗОН (%)</div>
            <div style="display:flex; gap:12px; margin-bottom:16px;">
                ${_zoneBar('⚡ Поток', focusPct, '#4FC3F7')}
                ${_zoneBar('☁ Норма', normalPct, '#81C784')}
                ${_zoneBar('🌙 Усталость', tiredPct, '#FFB74D')}
            </div>
        </div>

        <!-- КИМ по часам -->
        <div class="chart-card">
            <div class="chart-title">КИМ ПО ЧАСАМ СУТОК</div>
            <div class="hour-bars" id="hour-bars"></div>
        </div>

        <!-- Синхронизация -->
        <div class="sync-status">
            <div>
                <div class="sync-info">☁ Синхронизация с облаком</div>
                <div class="sync-sub">Загружает последние 7 дней истории КИМ в Supabase</div>
            </div>
            <button class="btn-sync" id="sync-btn" onclick="handleSync()">Синхронизировать</button>
        </div>
    `;

    // Рисуем почасовой график
    _renderHourBars(hourlyStats);
}

function _zoneBar(label, pct, color) {
    return `
        <div style="flex:1; text-align:center;">
            <div style="
                height:8px; border-radius:4px;
                background:${color}33; overflow:hidden; margin-bottom:8px;
            ">
                <div style="height:100%; width:${pct}%; background:${color}; border-radius:4px;"></div>
            </div>
            <div style="font-family:'JetBrains Mono',monospace; font-size:11px; color:${color};">${pct}%</div>
            <div style="font-family:'JetBrains Mono',monospace; font-size:10px; color:#6a8099; margin-top:2px;">${label}</div>
        </div>
    `;
}

function _renderHourBars(hourlyStats) {
    const container = document.getElementById('hour-bars');
    if (!container) return;

    const maxVal = Math.max(...hourlyStats, 1);

    // Показываем только каждые 3 часа лейблом, остальные — просто бары
    hourlyStats.forEach((val, h) => {
        const pct   = val > 0 ? Math.max(8, Math.round((val / maxVal) * 100)) : 4;
        const color = val > 70 ? '#4FC3F7' : val >= 40 ? '#81C784' : val > 0 ? '#FFB74D' : '#ffffff18';

        const wrap = document.createElement('div');
        wrap.className = 'hour-bar-wrap';
        wrap.innerHTML = `
            <div class="hour-bar" style="height:${pct}%; background:${color};"></div>
            <div class="hour-label">${h % 6 === 0 ? h : ''}</div>
        `;
        container.appendChild(wrap);
    });
}

// ─── Синхронизация ────────────────────────────────────────────────────────
async function handleSync() {
    const btn = document.getElementById('sync-btn');
    btn.disabled  = true;
    btn.textContent = '…';

    try {
        await CogneeSupabase.syncKIMHistory();
        btn.textContent = '✓ Готово';
        setTimeout(() => {
            btn.textContent = 'Синхронизировать';
            btn.disabled = false;
        }, 2000);
    } catch (e) {
        btn.textContent = 'Ошибка';
        btn.disabled = false;
    }
}

// ─── Выход ────────────────────────────────────────────────────────────────
async function handleSignOut() {
    await CogneeSupabase.signOut();
    window.location.href = 'auth.html';
}

function _esc(s) {
    return String(s)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
}
</script>
</body>
</html>
