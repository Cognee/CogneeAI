<!DOCTYPE html>
<!-- dashboard.html — v5.0 | Глобальная версия: 5.0 -->
<!-- Хронокогнитивный дашборд — личная страница профиля КИМ пользователя -->
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognee — Твой когнитивный профиль</title>
    <style>
        /* ─── ПЕРЕМЕННЫЕ ─────────────────────────────────────────────────────── */
        :root {
            --bg:         #0D1117;
            --bg-card:    #161B22;
            --bg-card2:   #1C2128;
            --border:     rgba(255,255,255,0.08);
            --text:       #E6EDF3;
            --text-dim:   #8B949E;
            --accent:     #4FC3F7;
            --green:      #81C784;
            --orange:     #FFB74D;
            --red:        #EF5350;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier New', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px 80px;
        }

        /* ─── ШАПКА ──────────────────────────────────────────────────────────── */
        .dash-header {
            max-width: 880px;
            margin: 0 auto 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .dash-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.04em;
        }

        .dash-title span {
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 400;
            display: block;
            margin-top: 4px;
            letter-spacing: 0.02em;
        }

        .dash-back {
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            border: 1px solid var(--accent);
            border-radius: 20px;
            padding: 7px 18px;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .dash-back:hover { background: rgba(79,195,247,0.12); }

        /* ─── ОСНОВНОЙ КОНТЕЙНЕР ─────────────────────────────────────────────── */
        .dash-wrap {
            max-width: 880px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ─── КАРТОЧКИ МЕТРИК ────────────────────────────────────────────────── */
        .metrics-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        @media (max-width: 620px) {
            .metrics-row { grid-template-columns: 1fr; }
        }

        .metric-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 22px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .metric-label {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .metric-value {
            font-size: 38px;
            font-weight: 700;
            line-height: 1;
        }

        .metric-sub {
            font-size: 12px;
            color: var(--text-dim);
        }

        /* ─── БЛОК ГРАФИКА ───────────────────────────────────────────────────── */
        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px 28px 20px;
        }

        .chart-title {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .chart-wrap {
            overflow-x: auto;
            padding-bottom: 4px;
        }

        svg.bar-chart {
            display: block;
            overflow: visible;
        }

        /* ─── ЛЕГЕНДА ────────────────────────────────────────────────────────── */
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-dim);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        /* ─── PLACEHOLDER ────────────────────────────────────────────────────── */
        .placeholder {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .placeholder-icon { font-size: 52px; margin-bottom: 16px; }

        .placeholder-text {
            font-size: 15px;
            line-height: 1.8;
        }

        .placeholder-text a {
            color: var(--accent);
            text-decoration: none;
        }

        .placeholder-text a:hover { text-decoration: underline; }

        /* ─── БЛОК ИСТОРИИ ───────────────────────────────────────────────────── */
        .history-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
        }

        .history-title {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-track { background: transparent; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 12px;
            border-radius: 6px;
            background: var(--bg-card2);
            font-size: 12px;
            gap: 8px;
        }

        .history-time { color: var(--text-dim); flex-shrink: 0; }
        .history-kim  { color: var(--text); font-weight: 600; }

        .zone-badge {
            font-size: 11px;
            padding: 2px 9px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .zone-focus  { background: rgba(79,195,247,0.15);  color: #4FC3F7; }
        .zone-normal { background: rgba(129,199,132,0.15); color: #81C784; }
        .zone-tired  { background: rgba(255,183,77,0.15);  color: #FFB74D; }

        /* ─── КНОПКА СБРОСА ──────────────────────────────────────────────────── */
        .reset-btn {
            background: transparent;
            color: var(--red);
            border: 1px solid rgba(239,83,80,0.35);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            margin-top: 14px;
        }

        .reset-btn:hover {
            background: rgba(239,83,80,0.1);
            border-color: rgba(239,83,80,0.6);
        }
    </style>
</head>
<body>

<div class="dash-header">
    <div class="dash-title">
        Твой когнитивный профиль
        <span>Cognee · локальная аналитика · v5.0</span>
    </div>
    <a class="dash-back" href="index.html">← Вернуться к статье</a>
</div>

<div class="dash-wrap" id="dash-content">
    <!-- Контент рендерится через JS ниже -->
</div>

<script src="storage.js"></script>
<script>
// Встроенный dashboard script — v5.0
(function () {

    const container = document.getElementById('dash-content');

    // ─── ВСПОМОГАТЕЛЬНЫЕ ─────────────────────────────────────────────────────

    function kimColor(kim) {
        if (kim > 70)  return '#4FC3F7';
        if (kim >= 40) return '#81C784';
        if (kim > 0)   return '#FFB74D';
        return '#2a2f38'; // нет данных за этот час/день
    }

    function zoneName(zone) {
        const map = { focus: 'Поток', normal: 'Норма', tired: 'Усталость' };
        return map[zone] || '—';
    }

    function pad(n) { return String(n).padStart(2, '0'); }

    function formatTime(ts) {
        const d = new Date(ts);
        return `${pad(d.getDate())}.${pad(d.getMonth() + 1)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    // ─── SVG СТОЛБЧАТАЯ ДИАГРАММА ────────────────────────────────────────────
    // Строит SVG-гистограмму без внешних библиотек.
    // values  — массив чисел 0–100
    // labels  — массив подписей (строки; пустая строка = не показываем)
    // svgW    — ширина SVG в пикселях
    function buildBarChart(values, labels, svgW) {
        const W      = svgW || 800;
        const H      = 150;
        const PAD_L  = 12;
        const PAD_R  = 12;
        const PAD_T  = 14;
        const PAD_B  = 28;
        const n      = values.length;
        const innerW = W - PAD_L - PAD_R;
        const innerH = H - PAD_T - PAD_B;
        const gapW   = innerW / n;
        const barW   = Math.max(4, Math.floor(gapW) - 4);

        let gridSVG = '';
        let rectSVG = '';
        let valSVG  = '';
        let lblSVG  = '';

        // Горизонтальные линии-ориентиры
        [25, 50, 75].forEach(pct => {
            const gy = PAD_T + innerH - (pct / 100) * innerH;
            gridSVG += `<line x1="${PAD_L}" y1="${gy.toFixed(1)}"
                              x2="${(W - PAD_R).toFixed(1)}" y2="${gy.toFixed(1)}"
                         stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
            gridSVG += `<text x="${PAD_L}" y="${(gy - 3).toFixed(1)}"
                          font-size="8" fill="rgba(255,255,255,0.2)"
                          font-family="'Courier New',monospace">${pct}</text>`;
        });

        values.forEach((v, i) => {
            const cx   = PAD_L + i * gapW + gapW / 2;
            const x    = cx - barW / 2;
            const barH = v > 0 ? Math.max(4, (v / 100) * innerH) : 2;
            const y    = PAD_T + innerH - barH;
            const col  = kimColor(v);
            const op   = v > 0 ? '1' : '0.12';

            rectSVG += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}"
                              width="${barW}" height="${barH.toFixed(1)}"
                              fill="${col}" rx="3" opacity="${op}"/>`;

            // Значение над столбиком (только если есть данные)
            if (v > 0) {
                valSVG += `<text x="${cx.toFixed(1)}" y="${(y - 5).toFixed(1)}"
                              text-anchor="middle" font-size="9" fill="${col}"
                              font-family="'Courier New',monospace">${v}</text>`;
            }

            // Подпись оси X
            if (labels[i]) {
                lblSVG += `<text x="${cx.toFixed(1)}" y="${(H - 7).toFixed(1)}"
                              text-anchor="middle" font-size="10" fill="#8B949E"
                              font-family="'Courier New',monospace">${labels[i]}</text>`;
            }
        });

        return `<svg class="bar-chart"
                     width="${W}" height="${H}"
                     viewBox="0 0 ${W} ${H}"
                     xmlns="http://www.w3.org/2000/svg">
                    ${gridSVG}${rectSVG}${valSVG}${lblSVG}
                </svg>`;
    }

    // ─── ГЛАВНЫЙ РЕНДЕР ───────────────────────────────────────────────────────
    function render() {

        // Проверяем наличие storage.js
        if (!window.CogneeStorage) {
            container.innerHTML = `
                <div class="chart-card">
                    <div class="placeholder">
                        <div class="placeholder-icon">⚠️</div>
                        <div class="placeholder-text">
                            storage.js не загружен.<br>
                            Убедись, что файл <strong>storage.js</strong>
                            находится в той же папке что и dashboard.html.
                        </div>
                    </div>
                </div>`;
            return;
        }

        const history = window.CogneeStorage.getHistory();

        // ── Нет данных ──────────────────────────────────────────────────────
        if (history.length === 0) {
            container.innerHTML = `
                <div class="chart-card">
                    <div class="placeholder">
                        <div class="placeholder-icon">🧠</div>
                        <div class="placeholder-text">
                            Читай <a href="index.html">статью</a> хотя бы 5 минут,<br>
                            и здесь появится твой когнитивный профиль.
                        </div>
                    </div>
                </div>`;
            return;
        }

        const hourly = window.CogneeStorage.getHourlyStats();
        const daily  = window.CogneeStorage.getDailyStats();
        const bestH  = window.CogneeStorage.getBestHour();
        const worstH = window.CogneeStorage.getWorstHour();
        const total  = history.length;
        const avgKIM = Math.round(
            history.reduce((s, r) => s + r.kim, 0) / total * 10
        ) / 10;

        // ── Карточки метрик ──────────────────────────────────────────────────
        const bestColor  = bestH  >= 0 ? kimColor(hourly[bestH])  : '#4FC3F7';
        const worstColor = worstH >= 0 ? kimColor(hourly[worstH]) : '#FFB74D';

        const metricsHTML = `
            <div class="metrics-row">
                <div class="metric-card">
                    <div class="metric-label">⚡ Лучший час</div>
                    <div class="metric-value" style="color:${bestColor}">
                        ${bestH >= 0 ? bestH + ':00' : '—'}
                    </div>
                    <div class="metric-sub">
                        ${bestH >= 0 ? 'средний КИМ · ' + hourly[bestH] : 'недостаточно данных'}
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">🌙 Тяжёлый час</div>
                    <div class="metric-value" style="color:${worstColor}">
                        ${worstH >= 0 ? worstH + ':00' : '—'}
                    </div>
                    <div class="metric-sub">
                        ${worstH >= 0 ? 'средний КИМ · ' + hourly[worstH] : 'недостаточно данных'}
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">📊 Записей / Средний КИМ</div>
                    <div class="metric-value" style="color:#E6EDF3">${total}</div>
                    <div class="metric-sub">средний КИМ · ${avgKIM}</div>
                </div>
            </div>`;

        // ── Подписи для графиков ──────────────────────────────────────────────
        // Для часового: показываем каждый 3-й час
        const hourLabels = Array.from({ length: 24 }, (_, i) =>
            i % 3 === 0 ? String(i) : '');

        const dayLabels = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];

        // ── Графики ──────────────────────────────────────────────────────────
        const chartHourHTML = `
            <div class="chart-card">
                <div class="chart-title">КИМ по часам суток</div>
                <div class="chart-wrap">
                    ${buildBarChart(hourly, hourLabels, 820)}
                </div>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-dot" style="background:#4FC3F7"></div>Поток (&gt;70)
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot" style="background:#81C784"></div>Норма (40–70)
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot" style="background:#FFB74D"></div>Усталость (&lt;40)
                    </div>
                </div>
            </div>`;

        const chartDayHTML = `
            <div class="chart-card">
                <div class="chart-title">КИМ по дням недели</div>
                <div class="chart-wrap">
                    ${buildBarChart(daily, dayLabels, 420)}
                </div>
            </div>`;

        // ── Последние 20 записей ──────────────────────────────────────────────
        const recent = history.slice(-20).reverse();
        const histItems = recent.map(r => `
            <div class="history-item">
                <span class="history-time">${formatTime(r.timestamp)}</span>
                <span class="history-kim">КИМ: ${r.kim}</span>
                <span class="zone-badge zone-${r.zone}">${zoneName(r.zone)}</span>
            </div>`).join('');

        const historyHTML = `
            <div class="history-card">
                <div class="history-title">Последние 20 записей</div>
                <div class="history-list">${histItems}</div>
                <button class="reset-btn" id="reset-btn">🗑 Очистить всю историю</button>
            </div>`;

        // ── Финальная сборка ──────────────────────────────────────────────────
        container.innerHTML = metricsHTML + chartHourHTML + chartDayHTML + historyHTML;

        // Кнопка очистки
        document.getElementById('reset-btn').addEventListener('click', () => {
            if (confirm('Удалить всю историю КИМ?\nЭто действие нельзя отменить.')) {
                localStorage.removeItem('cognee_kim_history');
                render();
            }
        });
    }

    // Запускаем после полной загрузки DOM
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', render);
    } else {
        render();
    }

})();
</script>
</body>
</html>
